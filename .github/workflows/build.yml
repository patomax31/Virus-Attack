name: Build Executables

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate app icons
        run: python tools/generate_app_icons.py

      - name: Build with PyInstaller
        run: python -m PyInstaller VirusAttack.spec --clean -y

      - name: Verify build output
        shell: pwsh
        run: |
          Write-Host "=== Contents of dist directory ==="
          if ($env:RUNNER_OS -eq "Windows") {
            Get-ChildItem -Force dist
          } else {
            Get-ChildItem -Force dist | Format-Table -AutoSize
          }

          Write-Host ""
          Write-Host "=== Packaged app contents ==="
          if (Test-Path dist/VirusAttack.app) {
            Get-ChildItem -Force dist/VirusAttack.app
          } elseif (Test-Path dist/VirusAttack) {
            Get-ChildItem -Force dist/VirusAttack
          } else {
            Write-Host "VirusAttack bundle not found!"
          }

      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          if [ "$RUNNER_OS" = "macOS" ]; then
            zip -r VirusAttack-macOS.zip VirusAttack.app
          else
            zip -r VirusAttack-Linux.zip VirusAttack
          fi

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path VirusAttack -DestinationPath VirusAttack-Windows.zip -Force

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VirusAttack-${{ runner.os }}
          path: dist/VirusAttack-${{ runner.os }}.zip

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VirusAttack-Windows
          path: dist/VirusAttack-Windows.zip
