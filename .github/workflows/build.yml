name: Build Executables

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate app icons
        run: python tools/generate_app_icons.py

      - name: Build with PyInstaller
        run: python -m PyInstaller VirusAttack.spec --clean

      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -r VirusAttack-${{ runner.os }}.zip VirusAttack

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/VirusAttack/* -DestinationPath dist/VirusAttack-Windows.zip

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VirusAttack-${{ runner.os }}
          path: dist/VirusAttack-${{ runner.os }}.zip

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VirusAttack-Windows
          path: dist/VirusAttack-Windows.zip
