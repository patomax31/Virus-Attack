name: Release Executables

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate app icons
        run: python tools/generate_app_icons.py

      - name: Build with PyInstaller
        run: python -m PyInstaller VirusAttack.spec --clean -y

      - name: Verify build output
        shell: pwsh
        run: |
          Write-Host "=== Contents of dist directory ==="
          if ($env:RUNNER_OS -eq "Windows") {
            Get-ChildItem -Force dist
          } else {
            Get-ChildItem -Force dist | Format-Table -AutoSize
          }

          Write-Host ""
          Write-Host "=== VirusAttack folder contents ==="
          if (Test-Path dist/VirusAttack) {
            Get-ChildItem -Force dist/VirusAttack
          } else {
            Write-Host "VirusAttack folder not found!"
          }

      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -r VirusAttack-${{ runner.os }}.zip VirusAttack

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path VirusAttack -DestinationPath VirusAttack-Windows.zip -Force

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VirusAttack-${{ runner.os }}
          path: dist/VirusAttack-${{ runner.os }}.zip

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: VirusAttack-Windows
          path: dist/VirusAttack-Windows.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List downloaded artifacts
        run: |
          echo "=== Contents of release-assets ==="
          find release-assets -type f
          echo ""
          echo "=== Total files found ==="
          find release-assets -type f | wc -l

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find release-assets -type f -name "*.zip" -exec cp {} release-files/ \;
          echo "=== Flattened artifacts ==="
          ls -lah release-files/
          echo ""
          echo "Files ready for release:"
          ls -1 release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}